name: Surf Report Quotidien

on:
  schedule:
    # Minute "creuse" (32) pour éviter l'engorgement du haut de l'heure chez GitHub.
    # 5h32 UTC = 7h32 Paris (été) / 6h32 (hiver). Avec le délai GitHub, arrive vers 7h30-8h.
    # Un seul cron = pas de double envoi. Le garde-fou dans send.js bloque tout envoi
    # automatique en dehors de 6h-10h Paris (anti-spam si GitHub déclenche en retard).
    - cron: '32 5 * * *'
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm ci

      - name: Envoyer le surf report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: node send.js
